gateway:
  port: 18789
  logLevel: info

  models:
    providers:
      minimax:
        baseUrl: "https://api.minimaxi.com/anthropic"
        apiKey: "${MINIMAX_API_KEY}"
        api: "anthropic-messages"
        authHeader: true
        models:
          - id: "MiniMax-M2.7"
            name: "MiniMax M2.7"
            reasoning: true
            contextWindow: 204800
            maxTokens: 131072

  channels:
    telegram:
      enabled: false

    email:
      enabled: false

  cron:
    enabled: true

  plugins:
    scanDirs:
      - "./plugins"
    autoLoad: true
