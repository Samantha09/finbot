gateway:
  port: 18789
  logLevel: info

  channels:
    telegram:
      enabled: true
      botToken: ${TELEGRAM_BOT_TOKEN}

    email:
      enabled: true
      smtp:
        host: "smtp.gmail.com"
        port: 587
        user: ${EMAIL_USER}
        pass: ${EMAIL_APP_PASSWORD}
      from: ${EMAIL_USER}
      to: ${NOTIFICATION_EMAIL}

  cron:
    enabled: true

  plugins:
    scanDirs:
      - "./plugins"
    autoLoad: true
