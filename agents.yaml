agents:
  finbot:
    id: finbot
    default: true
    model: minimax/MiniMax-M2.7
    thinkingDefault: off

    tools:
      allow:
        - marketQuery
        - portfolioAnalysis
        - riskAssessment
        - newsFetch
        - setAlert
        - technicalAnalysis
        - fundamentalAnalysis
        - strategyBacktest
        - checkAlerts
        - memoryBankRead
        - memoryBankWrite
      deny:
        - shellExec
        - fileWrite
        - fileDelete

    sandbox:
      mode: non-main
