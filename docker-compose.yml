services:
  finbot:
    build: .
    image: finbot:latest
    container_name: finbot
    env_file: .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-finbot-local-token}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
    volumes:
      - finbot-data:/root/.openclaw
      - ./workspace/backtest-reports:/root/.openclaw/workspace/backtest-reports
    network_mode: host
    restart: unless-stopped

volumes:
  finbot-data:
